<div class="support-compare">
  <div class="support-compare__col">
    <span class="support-compare__label">Посылка</span>
    <div class="support-compare__text">{{ submission_text|default:"—" }}</div>
  </div>
  <div class="support-compare__col support-compare__col--answer">
    <span class="support-compare__label">Ответ</span>
    <div class="support-compare__text">{{ correct_answer|default:"—" }}</div>
  </div>
</div>
