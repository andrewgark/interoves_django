{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Support Console — вход</title>
  <link rel="stylesheet" href="{% static 'css/new.css' %}?v={{ site_deploy_version|default:'0'|urlencode }}">
  <link rel="stylesheet" href="{% static 'css/support.css' %}?v={{ site_deploy_version|default:'0'|urlencode }}">
</head>
<body class="support-login-body">
  <div class="support-login">
    <div class="support-login__card pal-card">
      <h1 class="support-login__title">Support Console</h1>
      <p class="support-login__lead">Вход для сотрудников поддержки</p>

      {% if form.errors %}
        <p class="support-login__error">Неверный логин или пароль.</p>
      {% endif %}

      <form method="post" action="{% url 'support:login' %}" class="support-login__form">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <label class="support-login__label">
          <span>Логин</span>
          <input type="text" name="username" autofocus required autocomplete="username">
        </label>
        <label class="support-login__label">
          <span>Пароль</span>
          <input type="password" name="password" required autocomplete="current-password">
        </label>
        <button type="submit" class="new-btn">Войти</button>
      </form>

      <p class="support-login__hint">
        Нужен аккаунт в группе «Support Console».
        <a href="/admin/">Django admin</a>
      </p>
    </div>
  </div>
</body>
</html>
