  <script>
(function () {
  var b = document.body;
  var prevU = b.getAttribute("data-nav-prev") || "";
  var nextU = b.getAttribute("data-nav-next") || "";
  var x0 = null,
    y0 = null;
  var minDX = 56;
  var maxDY = 52;

  document.addEventListener(
    "touchstart",
    function (e) {
      if (!e.changedTouches || !e.changedTouches.length) return;
      x0 = e.changedTouches[0].clientX;
      y0 = e.changedTouches[0].clientY;
    },
    { passive: true }
  );

  document.addEventListener(
    "touchcancel",
    function () {
      x0 = null;
      y0 = null;
    },
    { passive: true }
  );

  document.addEventListener(
    "touchend",
    function (e) {
      if (x0 == null || !e.changedTouches || !e.changedTouches.length) return;
      var x1 = e.changedTouches[0].clientX;
      var y1 = e.changedTouches[0].clientY;
      var dx = x1 - x0;
      var dy = Math.abs(y1 - y0);
      x0 = null;
      y0 = null;
      if (dy > maxDY) return;
      if (Math.abs(dx) < minDX) return;
      if (dx < 0 && nextU) window.location.href = nextU;
      else if (dx > 0 && prevU) window.location.href = prevU;
    },
    { passive: true }
  );

  document.addEventListener("keydown", function (e) {
    if (e.ctrlKey || e.metaKey || e.altKey || e.shiftKey) return;
    var el = e.target;
    if (!el) return;
    var tag = el.tagName ? el.tagName.toLowerCase() : "";
    if (tag === "input" || tag === "textarea" || tag === "select" || el.isContentEditable) return;
    if (e.key === "ArrowLeft" && prevU) {
      e.preventDefault();
      window.location.href = prevU;
    } else if (e.key === "ArrowRight" && nextU) {
      e.preventDefault();
      window.location.href = nextU;
    }
  });
})();
  </script>
