#
# S3-backed static from collectstatic at https://interoves.com/static/...
# Matches STATIC_URL when USE_S3 + IS_PROD (see settings.py).
#
location ^~ /static/ {
    proxy_ssl_server_name on;
    proxy_set_header Host interoves-django-static.s3.amazonaws.com;

    proxy_pass https://interoves-django-static.s3.amazonaws.com;

    proxy_redirect off;
}
