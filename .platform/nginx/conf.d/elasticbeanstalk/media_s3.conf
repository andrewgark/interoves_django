#
# Make S3-backed media accessible at https://interoves.com/media/...
# Reverse-proxy to S3 so the browser URL remains on interoves.com.
#
location ^~ /media/ {
    proxy_ssl_server_name on;
    proxy_set_header Host interoves-django-static.s3.amazonaws.com;

    # Keep proxy_pass static (no variables) so Nginx can resolve via system DNS
    # without needing an explicit `resolver` directive.
    proxy_pass https://interoves-django-static.s3.amazonaws.com;

    proxy_redirect off;
}

